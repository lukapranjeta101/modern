  </g>

  <circle cx="512" cy="512" r="390" fill="url(#specular)"/>
  <circle cx="512" cy="512" r="390" fill="url(#shade)"/>
  <circle cx="512" cy="512" r="390" fill="url(#rim)"/>
  <circle cx="512" cy="512" r="390" stroke="#D4F2FF" stroke-opacity="0.5" stroke-width="3"/>
</svg>
